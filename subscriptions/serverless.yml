service: subscriptions

provider:
  name: aws
  runtime: nodejs8.10
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment:
    REGION: ${self:provider.region}
    STAGE: ${self:provider.stage}
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /users/{id}: ${cf:users-${self:provider.stage}.RestApiRootResourceId}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getSubscription:
    handler: handler.handleGetSubscription
    events:
      - http:
          path: subscriptions/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
  getUserSubscriptions:
    handler: handler.handleGetUserSubscriptions
    events:
      - http:
          path: users/{id}/subscriptions
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
  isUserSubscribed:
    handler: handler.handleIsUserSubscribed

  postSubscription:
    handler: handler.handlePostSubscription
    events:
      - http:
          path: subscriptions/{id}
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  patchSubscription:
    handler: handler.handlePatchSubscription
    events:
      - http:
          path: subscriptions/{id}
          method: patch
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpackIncludeModules: true
