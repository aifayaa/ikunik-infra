service: subscriptions

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 60
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment:
    REGION: us-east-1
    STAGE: ${self:provider.stage}
    DB_NAME: crowdaaDev
    MONGO_URL: ${self:custom.mongoDB.${self:provider.stage}}
  apiGateway:
    restApiId: ${self:custom.apiGateway.restApiId.${self:provider.stage}}
    restApiRootResourceId: ${self:custom.apiGateway.restApiRootResourceId.${self:provider.stage}}
    restApiResources:
      /users/{id}: ${self:custom.endpoints.users.${self:provider.stage}}

functions:
  getSubscription:
    handler: handler.handleGetSubscription
    events:
      - http:
          path: subscriptions/{id}
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: subscriptionsAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
  getUserSubscriptions:
    handler: handler.handleGetUserSubscriptions
    events:
      - http:
          path: users/{id}/subscriptions
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: subscriptionsAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
  isUserSubscribed:
    handler: handler.handleIsUserSubscribed

  postSubscription:
    handler: handler.handlePostSubscription
    events:
      - http:
          path: subscriptions/{id}
          method: post
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: subscriptionsAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  apiGateway:
    restApiId:
      dev: diqdv4fvol
      prod: xbtq2qqal5
    restApiRootResourceId:
      dev: aus9fmgcr3
      prod: hp7jubgyp7
  endpoints:
    users:
      dev: zuyf1o
      prod: z3ukbo

  authorizer:
    dev: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorize
    prod: arn:aws:lambda:us-east-1:630176884077:function:account-prod-authorize

  mongoDB:
    dev: mongodb://crowdaaMS:b0cfc2ffd49b6f27af7ed0cda6a49025@mongodev.aws.crowdaa.com:27017/crowdaaDev
    prod: mongodb://crowdaaMS:9871e59eac27cc669218907c570da230@aws-eu-west-1-portal.10.dblayer.com:18012,aws-eu-west-1-portal.8.dblayer.com:18012/crowdaaDev?ssl=true

  webpackIncludeModules: true
