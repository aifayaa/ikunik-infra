service: users

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 60
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment:
    STAGE: ${self:provider.stage}
    MINIMUM_PAYOUT: 600
    CROWDAA_FEES: 0.2
    DB_NAME: crowdaaDev
    MONGO_URL: mongodb://crowdaaDev:crowdaaDev@aws-eu-west-1-portal.10.dblayer.com:18012,aws-eu-west-1-portal.8.dblayer.com:18012/crowdaaDev?ssl=true
  apiGateway:
    restApiId: ${self:custom.apiGateway.restApiId.${self:provider.stage}}
    restApiRootResourceId: ${self:custom.apiGateway.restApiRootResourceId.${self:provider.stage}}

functions:
  blastEmail:
    handler: handler.handleBlastEmail
    events:
      - http:
          path: users/{id}/blast/email
          method: post
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
  
  blastNotification:
    handler: handler.handleBlastNotification
    events:
      - http:
          path: users/{id}/blast/notification
          method: post
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
  
  blastText:
    handler: handler.handleBlastText
    events:
      - http:
          path: users/{id}/blast/text
          method: post
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

  getProfile:
    handler: handler.handleGetProfile
    events:
      - http:
          path: users/{id}/profile
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

  getBalances:
    handler: handler.handleGetBalances
    events:
      - http:
          path: users/{id}/balances
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

  getPurchases:
    handler: handler.handleGetPurchases
    events:
      - http:
          path: users/{id}/projects/purchases
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

  getPayouts:
    handler: handler.handleGetPayouts
    events:
      - http:
          path: users/{id}/payouts
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
  
  isBlastable:
    handler: handler.handleIsBlastable
    events:
      - http:
          path: users/{id}/isBlastable
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

  addPayout:
    handler: handler.handleAddPayout
    events:
      - http:
          path: users/{id}/payouts
          method: post
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: usersAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  apiGateway:
    restApiId:
      dev: diqdv4fvol
      prod: xbtq2qqal5
    restApiRootResourceId:
      dev: aus9fmgcr3
      prod: hp7jubgyp7

  authorizer:
    dev: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorize
    prod: arn:aws:lambda:us-east-1:630176884077:function:account-prod-authorize

  webpackIncludeModules: true
