service: users

provider:
  name: aws
  runtime: nodejs8.10
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  blastEmail:
    handler: handler.handleBlastEmail
    events:
      - http:
          path: users/{id}/blast/email
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  blastNotification:
    handler: handler.handleBlastNotification
    events:
      - http:
          path: users/{id}/blast/notification
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  blastText:
    handler: handler.handleBlastText
    events:
      - http:
          path: users/{id}/blast/text
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getProfile:
    handler: handler.handleGetProfile
    events:
      - http:
          path: users/{id}/profile
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getBalances:
    handler: handler.handleGetBalances
    events:
      - http:
          path: users/{id}/balances
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getPayouts:
    handler: handler.handleGetPayouts
    events:
      - http:
          path: users/{id}/payouts
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getUser:
    handler: handler.handleGetUser

  getUserPublic:
    handler: handler.handleGetUserPublic
    events:
      - http:
          path: users/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getHistory:
    handler: handler.handleGetHistory
    events:
      - http:
          path: users/{id}/history/
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  addHistory:
    handler: handler.handleAddHistory
    events:
      - http:
          path: users/{id}/history/
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  optIn:
    handler: handlers/optIn.default
    events:
      - http:
          path: users/{id}/optin
          method: put
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  isBlastable:
    handler: handler.handleIsBlastable
    events:
      - http:
          path: users/{id}/isBlastable
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  addPayout:
    handler: handler.handleAddPayout
    events:
      - http:
          path: users/{id}/payouts
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  sendPinCode:
    handler: handlers/sendPinCode.default
    events:
      - http:
          path: users/{id}/phone
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
  checkPinCode:
    handler: handlers/checkPinCode.default
    events:
      - http:
          path: users/{id}/phone/validation
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  generateApiToken:
    handler: handlers/generateApiToken.default
    events:
      - http:
          path: users/{id}/apiToken
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpackIncludeModules: true

resources:
  Outputs:
    RestApiRootResourceId:
      Description: Api Gateway users ID
      Value:
        Ref: ApiGatewayResourceUsersIdVar
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourceId
