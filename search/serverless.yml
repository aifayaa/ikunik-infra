service: search

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}

functions:
  createIndex:
    handler: handlers/createIndex.handleCreateIndex
  search:
    handler: handlers/search.handleSearch
    events:
      - http:
          path: search
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              querystrings: ${self:custom.querystrings}

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  IntegrationRequestParameters:
    integration.request.querystring.text: method.request.querystring.text
  querystrings:
    text: false
  RequestParameters:
    method.request.header.Authorization: true

resources:
  Resources:
    ApiGatewayMethodSearchGet:
      Properties:
        RequestParameters: ${self:custom.RequestParameters}
        Integration:
          RequestParameters: ${self:custom.IntegrationRequestParameters}
          CacheNamespace: ApiGatewayMethodSearchCacheNS
          CacheKeyParameters:
            - method.request.header.Authorization
            - method.request.querystring.text
