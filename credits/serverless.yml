service: credits

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getCreditPackages:
    handler: handlers/getPackages.default
    events:
      - http:
          path: credits/packages
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

  getCreditPackage:
    handler: handlers/getPackage.default
    events:
      - http:
          path: credits/packages/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  getCredits:
    handler: handlers/getCredits.default
    events:
      - http:
          path: credits/
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

  addCredits:
    handler: handlers/addCredits.default

  removeCredits:
    handler: handlers/removeCredits.default

plugins:
  - serverless-offline
  - serverless-webpack
  - serverless-prune-plugin

custom:
  prune:
    automatic: true
    number: 3

package:
  individually: true

resources:
  Resources:
    ApiGatewayMethodCreditsGet:
      Properties:
        RequestParameters:
          method.request.header.Authorization: true
          method.request.header.x-api-key: true
        Integration:
          CacheNamespace: ApiGatewayMethodCreditsGetCacheNS
          CacheKeyParameters:
            - method.request.header.Authorization
            - method.request.header.x-api-key
