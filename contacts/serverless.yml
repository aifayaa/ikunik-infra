service: contacts

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  <<<: 
    - environment:
      LIMIT_DEFAULT: '10'
      LIMIT_MAX: '100'

  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  deleteContact:
    handler: handlers/deleteContact.default
    events:
      - http:
          path: contacts/{id}
          method: delete
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  getContacts:
    handler: handlers/getContacts.default
    events:
      - http:
          path: contacts/
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              querystrings:
                filter: false
                idsOnly: false
                limit: false
                search: false
                skip: false
                sortBy: false
                sortOrder: false
                type: false

plugins:
  - serverless-offline
  - serverless-webpack

package:
  individually: true

resources:
  Resources:
    ApiGatewayMethodContactsGet:
      Properties:
        RequestParameters:
          method.request.header.Authorization: true
          method.request.header.x-api-key: true
          method.request.querystring.filter: false
          method.request.querystring.idsOnly: false
          method.request.querystring.limit: false
          method.request.querystring.search: false
          method.request.querystring.skip: false
          method.request.querystring.sortBy: false
          method.request.querystring.sortOrder: false
          method.request.querystring.type: false
        Integration:
          RequestParameters:
            integration.request.header.x-api-key: method.request.header.x-api-key
            integration.request.querystring.filter: method.request.querystring.filter
            integration.request.querystring.idsOnly: method.request.querystring.idsOnly
            integration.request.querystring.limit: method.request.querystring.limit
            integration.request.querystring.search: method.request.querystring.search
            integration.request.querystring.skip: method.request.querystring.skip
            integration.request.querystring.sortBy: method.request.querystring.sortBy
            integration.request.querystring.sortOrder: method.request.querystring.sortOrder
            integration.request.querystring.type: method.request.querystring.type
          CacheNamespace: ApiGatewayMethodContactsGetCacheNS
          CacheKeyParameters:
            - method.request.header.Authorization
            - method.request.header.x-api-key
            - method.request.querystring.filter
            - method.request.querystring.idsOnly
            - method.request.querystring.limit
            - method.request.querystring.search
            - method.request.querystring.skip
            - method.request.querystring.sortBy
            - method.request.querystring.sortOrder
            - method.request.querystring.type
