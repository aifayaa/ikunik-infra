service: account

provider:
  name: aws
  runtime: nodejs6.10
  memorySize: 128
  timeout: 60
  environment:
    MONGO_URL: ${self:custom.mongoDB.${self:provider.stage}}

functions:
  authorize:
    handler: handler.handleAuthorize
  authorizeAdmin:
    handler: handler.handleAuthorizeAdmin

