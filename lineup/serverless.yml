service: lineup

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 60
  iamRoleStatements:
    - Effect: Allow
      Action:
        - events:PutRule
      Resource: "*"
    - Effect: Allow
      Action:
        - events:DeleteRule
      Resource: "*"
    - Effect: Allow
      Action:
        - events:PutTargets
      Resource: "*"
    - Effect: Allow
      Action:
        - events:RemoveTargets
      Resource: "*"
    - Effect: Allow
      Action: 
        - iam:PassRole
      Resource: arn:aws:iam::*:role/AWS_Events_Invoke_Targets
    - Effect: Allow
      Action: sts:AssumeRole
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:AddPermission
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:RemovePermission
      Resource: "*"
  environment:
    STAGE: ${self:provider.stage}
    REGION: us-east-1
    COLL_NAME: lineup
    DB_NAME: crowdaaDev
    MONGO_URL: ${self:custom.mongoDB.${self:provider.stage}}
    BLAST_TEXT: ${self:custom.blast.text.${self:provider.stage}}
    BLAST_NOTIF: ${self:custom.blast.notif.${self:provider.stage}}
  apiGateway:
    restApiId: ${self:custom.apiGateway.restApiId.${self:provider.stage}}
    restApiRootResourceId: ${self:custom.apiGateway.restApiRootResourceId.${self:provider.stage}}
    restApiResources:
      /artists/{id}: ${self:custom.endpoints.artists.${self:provider.stage}}
      /festivals/{id}: ${self:custom.endpoints.festivals.${self:provider.stage}}
      /scenes/{id}: ${self:custom.endpoints.scenes.${self:provider.stage}}

functions:
  notifyLineup:
    handler: handler.handlerNotifyLineup

  postLineup:
    handler: handler.handlePostLineup
    events:
      - http:
          path: lineup/
          method: post
          authorizer:
            arn: ${self:custom.authorizerAdmin.${self:provider.stage}}
            name: lineupAdminAuthorizer
          cors: true

  getLineup:
    handler: handler.handleGetLineup
    events:
      - http:
          path: artists/{id}/lineup
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: lineupAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
      - http:
          path: festivals/{id}/lineup
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: lineupAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
      - http:
          path: scenes/{id}/lineup
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: lineupAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  apiGateway:
    restApiId:
      dev: diqdv4fvol
      prod: xbtq2qqal5
    restApiRootResourceId:
      dev: aus9fmgcr3
      prod: hp7jubgyp7
  endpoints:
    artists:
      dev: yuiww2
      prod: z405t7
    festivals:
      dev: m2gnhw
      prod: #TO FILL
    scenes:
      dev: jq59p9
      prod: #TO FILL

  authorizer:
    dev: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorize
    prod: arn:aws:lambda:us-east-1:630176884077:function:account-prod-authorize

  authorizerAdmin:
    dev: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorizeAdmin
    prod: arn:aws:lambda:us-east-1:630176884077:function:account-prod-authorizeAdmin
  
  blast:
    text:
      dev: blast-prod-blastText
      prod: blast-prod-blastText
    notif:
      dev: blast-prod-blastNotification
      prod: blast-prod-blastNotification
  mongoDB:
    dev: mongodb://crowdaaDev:crowdaaDev@35.164.98.157:27017/crowdaaDev
    prod: mongodb://crowdaaDev:crowdaaDev@aws-eu-west-1-portal.10.dblayer.com:18012,aws-eu-west-1-portal.8.dblayer.com:18012/crowdaaDev?ssl=true

  webpackIncludeModules: true
