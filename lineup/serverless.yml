service: lineup

provider:
  name: aws
  runtime: nodejs16.x
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - events:PutRule
      Resource: "*"
    - Effect: Allow
      Action:
        - events:DeleteRule
      Resource: "*"
    - Effect: Allow
      Action:
        - events:PutTargets
      Resource: "*"
    - Effect: Allow
      Action:
        - events:RemoveTargets
      Resource: "*"
    - Effect: Allow
      Action:
        - iam:PassRole
      Resource: arn:aws:iam::*:role/AWS_Events_Invoke_Targets
    - Effect: Allow
      Action: sts:AssumeRole
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:AddPermission
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:RemovePermission
      Resource: "*"
  environment: ${file(../env.yml)}
  <<<:
    - environment:
      BLAST_TEXT: ${self:custom.blast.text.${self:provider.stage}}
      BLAST_NOTIF: ${self:custom.blast.notif.${self:provider.stage}}
      USE_BLAST_TEXT: false
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /artists/{id}: ${cf:artists-${self:provider.stage}.RestApiRootResourceId}
      /festivals/{id}: ${cf:festivals-${self:provider.stage}.RestApiRootResourceId}
      /stages/{id}: ${cf:stages-${self:provider.stage}.RestApiRootResourceId}
      /users/{id}: ${cf:users-${self:provider.stage}.RestApiRootResourceId}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  notifyLineup:
    handler: handlers/notifyLineup.default

  postLineup:
    handler: handlers/postLineup.default
    events:
      - http:
          path: lineup/
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

  createNotifyLineup:
    handler: handlers/createNotifyLineup.default
    events:
      - http:
          path: lineup/{id}/notifications
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

  createNotifyAllLineup:
    handler: handlers/createNotifyAllLineup.default
    events:
      - http:
          path: lineup/notifications
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

  getPublicLineups:
    handler: handlers/getLineups.default
    events:
      - http:
          path: lineups/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              headers:
                Authorization: true

  getLineups:
    handler: handlers/getLineupType.default
    events:
      - http:
          path: artists/{id}/lineup
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true
      - http:
          path: festivals/{id}/lineup
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true
      - http:
          path: stages/{id}/lineup
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true

  getLineup:
    handler: handlers/getLineup.default
    events:
      - http:
          path: lineups/{id}
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true

  getUserLineups:
    handler: handlers/getUserLineups.default
    events:
      - http:
          path: users/{id}/lineups
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

plugins:
  - serverless-disable-request-validators
  - serverless-webpack
  - serverless-prune-plugin

package:
  individually: true

custom:
  prune:
    automatic: true
    number: 3
  serverless-disable-request-validators:
    action: delete
  blast:
    text:
      dev: blast-dev-blastText
      preprod: blast-prod-blastText
      prod: blast-prod-blastText
      awax: blast-prod-blastText
    notif:
      dev: blast-dev-blastNotification
      preprod: blast-prod-blastNotification
      prod: blast-prod-blastNotification
      awax: blast-prod-blastNotification

resources:
  Outputs:
    RestApiRootResourceId:
      Description: Api Gateway lineup ID
      Value:
        Ref: ApiGatewayResourceLineupIdVar
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourceId
