service: api-v1

provider:
  name: aws
  stage: ${opt:stage, "dev"}
  runtime: nodejs6.10
  memorySize: 128
  timeout: 60

functions:
  getV1:
    handler: handler.handleGetV1
    events:
      - http:
          path: /
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: v1Authorizer
          cors: true

plugins:
  - serverless-domain-manager
  - serverless-webpack

package:
  individually: true

custom:
  authorizer:
    dev: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorize
    prod: arn:aws:lambda:us-east-1:630176884077:function:account-prod-authorize

  domains:
    prod: api.aws.crowdaa.com
    dev: dev-api.aws.crowdaa.com

  customDomain:
    basePath: "v1"
    domainName: ${self:custom.domains.${self:provider.stage}}
    stage: "${self:provider.stage}"
    createRoute53Record: true

  webpackIncludeModules: true
