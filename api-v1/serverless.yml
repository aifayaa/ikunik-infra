# TEMP deployment procedure:
# - comment MethodSettings, restApiGatewayDeployment and restApiBasePathMapping on first
# - deploy api-v1
# - run deploy script for others MS
# - uncomment previous then re-deploy api-v1

service: api-v1

provider:
  name: aws
  stage: ${opt:stage, "dev"}
  runtime: nodejs6.10
  memorySize: 128
  timeout: 30

functions:
  getV1:
    handler: handler.handleGetV1
    events:
      - http:
          path: /
          method: get
          cors: true

plugins:
  - serverless-plugin-bind-deployment-id
  # - serverless-domain-manager # See https://github.com/serverless/serverless/issues/4029#issuecomment-386045929
  - serverless-webpack

package:
  individually: true

custom:
  mongoDB:
    dev: mongodb://crowdaaMS:b0cfc2ffd49b6f27af7ed0cda6a49025@mongodev.aws.crowdaa.com:27017/crowdaaDev
    prod: mongodb://crowdaaMS:9871e59eac27cc669218907c570da230@crowdaa-shard-00-00-vtd2k.mongodb.net:27017,crowdaa-shard-00-01-vtd2k.mongodb.net:27017,crowdaa-shard-00-02-vtd2k.mongodb.net:27017/crowdaaDev?ssl=true&replicaSet=crowdaa-shard-0&authSource=admin
    defJam: mongodb://crowdaaMS:9871e59eac27cc669218907c570da230@aws-us-west-2-portal.2.dblayer.com:18201,aws-us-west-2-portal.1.dblayer.com:18201/crowdaaDev?ssl=true

  domains:
    prod: api.aws.crowdaa.com
    dev: dev-api.aws.crowdaa.com
    defJam: defjam-api.aws.crowdaa.com

  customDomain:
    basePath: "v1"
    domainName: ${self:custom.domains.${self:provider.stage}}
    stage: "${self:provider.stage}"
    createRoute53Record: true

  webpackIncludeModules: true

resources:
  Resources:
    ApiGatewayStage:
      Type: "AWS::ApiGateway::Stage"
      Properties:
        StageName: ${self:provider.stage}
        Description: "stage of api-v1"
        RestApiId:
          Ref: "ApiGatewayRestApi"
        DeploymentId:
          Ref: __deployment__
        CacheClusterEnabled: true
        CacheClusterSize: "0.5"
        MethodSettings:
          - ResourcePath: "/*"
            CachingEnabled: false
            HttpMethod: "*"
            LoggingLevel: "INFO"
            MetricsEnabled: true
          - ResourcePath: "/artists/{id}"
            CacheTtlInSeconds: 3600
            CachingEnabled: true
            HttpMethod: "GET"
            LoggingLevel: "INFO"
            MetricsEnabled: true
          - ResourcePath: "/audios/{id}"
            CacheTtlInSeconds: 3600
            CachingEnabled: true
            HttpMethod: "GET"
            LoggingLevel: "INFO"
            MetricsEnabled: true
          - ResourcePath: "/crowd"
            CacheDataEncrypted: true
            CacheTtlInSeconds: 3600
            CachingEnabled: true
            HttpMethod: "GET"
            LoggingLevel: "INFO"
            MetricsEnabled: true
          - ResourcePath: "/selections"
            CacheTtlInSeconds: 3600
            CachingEnabled: true
            HttpMethod: "GET"
            LoggingLevel: "INFO"
            MetricsEnabled: true
          - ResourcePath: "/selections/{id}"
            CacheTtlInSeconds: 3600
            CachingEnabled: true
            HttpMethod: "GET"
            LoggingLevel: "INFO"
            MetricsEnabled: true

    restApiGatewayDeployment:
      Type: "AWS::ApiGateway::Deployment"
      DependsOn: ApiGatewayMethodGet
      Properties:
        Description: ${self:provider.stage} Environment
        RestApiId:
          Ref: ApiGatewayRestApi
        StageName: ${self:provider.stage}

    restApiBasePathMapping:
      Type: AWS::ApiGateway::BasePathMapping
      DependsOn: restApiGatewayDeployment
      Properties:
        BasePath: "v1"
        DomainName: ${self:custom.domains.${self:provider.stage}}
        RestApiId:
          Ref: ApiGatewayRestApi
        Stage: ${self:provider.stage}

  Outputs:
    ApiGatewayStage:
      Description: Api Gateway Stage
      Value:
        Ref: ApiGatewayStage
      Export:
        Name: ${self:service}:${self:provider.stage}:ApiGatewayStage
    MongoURL:
      Description: MongoDB URL
      Value: ${self:custom.mongoDB.${self:provider.stage}}
      Export:
        Name: ${self:service}:${self:provider.stage}:MongoURL
    RestApiId:
      Description: Api Gateway ID
      Value: 
        Ref: ApiGatewayRestApi
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiId
    RestApiRootResourceId:
      Description: Api Gateway ID
      Value: {"Fn::GetAtt":["ApiGatewayRestApi","RootResourceId"]}
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourceId
