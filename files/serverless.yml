service: files

provider:
  name: aws
  runtime: nodejs8.10
  stage: ${opt:stage, "dev"}
  memorySize: 256
  timeout: 30
  iamRoleStatements:
    - Effect: 'Allow'
      Action:
        - 's3:*'
      Resource: 'arn:aws:s3:::${self:provider.environment.S3_BUCKET}/*'
    - Effect: 'Allow'
      Action:
        - 's3:*'
      Resource: 'arn:aws:s3:::${self:provider.environment.S3_PICTURES_BUCKET}/*'
  environment:
    DB_NAME: crowdaaDev
    S3_BUCKET: slsupload-${self:provider.stage}
    S3_PICTURES_BUCKET: crowdaa-pictures-${self:provider.stage}
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
    STAGE: ${self:provider.stage}
    PICTURES_COLL: pictures
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}

functions:
  getUploadUrl:
    handler: handlers/getUploadUrl.default
    events:
      - http:
          path: files
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true

  onFileCreated:
    handler: handlers/onFileCreated.default

plugins:
  - serverless-webpack

resources:
  Resources:
    UploadBucket:
      Type: AWS::S3::Bucket
      DependsOn: OnFileCreatedLambdaPermissionSlsUploadS3
      Properties:
        AccessControl: PublicRead
        BucketName: ${self:provider.environment.S3_BUCKET}
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
        NotificationConfiguration:
          LambdaConfigurations:
            - Event: s3:ObjectCreated:*
              Function:
                Fn::GetAtt:
                  - OnFileCreatedLambdaFunction
                  - Arn
    OnFileCreatedLambdaPermissionSlsUploadS3:
      Type: AWS::Lambda::Permission
      DependsOn: OnFileCreatedLambdaFunction
      Properties:
        FunctionName:
          Fn::GetAtt:
            - OnFileCreatedLambdaFunction
            - Arn
        Principal: s3.amazonaws.com
        Action: lambda:InvokeFunction
        SourceAccount:
          Ref: AWS::AccountId
        SourceArn: arn:aws:s3:::${self:provider.environment.S3_BUCKET}

custom:
  webpack:
    includeModules:
      forceInclude:
        - sharp
