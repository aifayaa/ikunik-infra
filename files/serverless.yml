service: files

provider:
  name: aws
  runtime: nodejs8.10
  stage: ${opt:stage, "dev"}
  memorySize: 256
  timeout: 30
  iamRoleStatements:
    - Effect: 'Allow'
      Action:
        - 's3:*'
      Resource: 'arn:aws:s3:::${self:provider.environment.S3_UPLOAD_BUCKET}/*'
    - Effect: 'Allow'
      Action:
        - 's3:*'
      Resource: 'arn:aws:s3:::${self:provider.environment.S3_PICTURES_BUCKET}/*'
  environment:
    $<<:
      - ${file(../env.yml)}
      - ${file(./env.${self:provider.stage}.yml)}
    S3_UPLOAD_BUCKET: slsupload-${self:provider.stage}
    S3_PICTURES_BUCKET: crowdaa-pictures-${self:provider.stage}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getUploadUrl:
    handler: handlers/getUploadUrl.default
    events:
      - http:
          path: files
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

  onFileCreated:
    handler: handlers/onFileCreated.default
    timeout: 600 # timeout set to 10 minutes for image/video encoding

plugins:
  - '@cruglobal/serverless-merge-config'
  - serverless-export-env
  - serverless-webpack

resources:
  Resources:
    UploadBucket:
      Type: AWS::S3::Bucket
      DependsOn: OnFileCreatedLambdaPermissionSlsUploadS3
      Properties:
        AccessControl: PublicRead
        BucketName: ${self:provider.environment.S3_UPLOAD_BUCKET}
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
        NotificationConfiguration:
          LambdaConfigurations:
            - Event: s3:ObjectCreated:*
              Function:
                Fn::GetAtt:
                  - OnFileCreatedLambdaFunction
                  - Arn
    OnFileCreatedLambdaPermissionSlsUploadS3:
      Type: AWS::Lambda::Permission
      DependsOn: OnFileCreatedLambdaFunction
      Properties:
        FunctionName:
          Fn::GetAtt:
            - OnFileCreatedLambdaFunction
            - Arn
        Principal: s3.amazonaws.com
        Action: lambda:InvokeFunction
        SourceAccount:
          Ref: AWS::AccountId
        SourceArn: arn:aws:s3:::${self:provider.environment.S3_UPLOAD_BUCKET}

custom:
  webpack:
    includeModules:
      forceInclude:
        - sharp
