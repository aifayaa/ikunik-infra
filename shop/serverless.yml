service: shop

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 60
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment:
    REGION: us-east-1
    STAGE: ${self:provider.stage}
    DB_NAME: crowdaaDev
    MONGO_URL: ${self:custom.mongoDB.${self:provider.stage}}
    PRINTFUL_URL: ${self:custom.printfulURL.${self:provider.stage}}
    PRINTFUL_KEY: NzV2Z25oMHEtaXY2MS1ubnJpOjg5bGotaW9yemxka2c3Zmxx
  apiGateway:
    restApiId: ${self:custom.apiGateway.restApiId.${self:provider.stage}}
    restApiRootResourceId: ${self:custom.apiGateway.restApiRootResourceId.${self:provider.stage}}

functions:
  getShopItems:
    handler: handler.handleGetShopItems
    events:
      - http:
          path: shop/items
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: shopAuthorizer
          cors: true
  getShopItem:
    handler: handler.handleGetShopItem
    events:
      - http:
          path: shop/items/{id}
          method: get
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: shopAuthorizer
          cors: true
          request:
            parameters:
              paths:
                id: true
  postShopOrder:
    handler: handler.handlePostShopOrder
    events:
      - http:
          path: shop/orders
          method: post
          authorizer:
            arn: ${self:custom.authorizer.${self:provider.stage}}
            name: shopAuthorizer
          cors: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  apiGateway:
    restApiId:
      dev: diqdv4fvol
      prod: xbtq2qqal5
    restApiRootResourceId:
      dev: aus9fmgcr3
      prod: hp7jubgyp7

  authorizer:
    dev: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorize
    prod: arn:aws:lambda:us-east-1:630176884077:function:account-prod-authorize

  mongoDB:
    dev: mongodb://crowdaaDev:crowdaaDev@35.164.98.157:27017/crowdaaDev
    prod: mongodb://crowdaaDev:crowdaaDev@aws-eu-west-1-portal.10.dblayer.com:18012,aws-eu-west-1-portal.8.dblayer.com:18012/crowdaaDev?ssl=true
  
  printfulURL:
    dev: https://api.printful.com/orders
    prod: https://api.printful.com/orders?confirm=1
  
  webpackIncludeModules: true
