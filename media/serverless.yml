service: media

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
   - Effect: Allow
     Action:
       - lambda:InvokeFunction
     Resource: "*"
  environment:
    REGION: ${self:provider.region}
    STAGE: ${self:provider.stage}
    COLL_AUDIOS: audio
    COLL_VIDEOS: video
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}

functions:
  checkUserMedia:
    handler: handler.handleCheckUserMedia

  getMedium:
    handler: handler.handleGetMedium
    events:
      - http:
          path: media/{type}/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                type: true
                id: true
  
  postMediumView:
    handler: handler.handlePostMediumView
    events:
      - http:
          path: media/{type}/{id}/views
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                type: true
                id: true

  getMediumLockState:
    handler: handler.handleGetMediumLockState
    events:
      -  http:
          path: media/{type}/{id}/lock
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                type: true
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpackIncludeModules: true
