service: ssr

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    $<<:
      - ${file(../env.yml)}
      - ${file(./env.${self:provider.stage}.yml)}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  ticket:
    handler: handlers/ticket.handleArtist
    events:
      - http:
          path: /ticket/artists/{id}
          method: get
          request:
            parameters:
              querystrings:
                redirect_url: false
                appName: false

  selection:
    handler: handlers/selection.default
    events:
      - http:
          path: /selections/{id}
          method: get
          request:
            parameters:
              querystrings:
                redirect_url: false
                appName: false

  article:
    handler: handlers/article.default
    events:
      - http:
          path: /articles/{id}
          method: get
          request:
            parameters:
              querystrings:
                redirect_url: false
                appName: false

  userArticle:
    handler: handlers/userArticle.default
    events:
      - http:
          path: /userArticles/{id}
          method: get
          request:
            parameters:
              querystrings:
                redirect_url: false
                appName: false

plugins:
  - serverless-offline
  - '@cruglobal/serverless-merge-config'
  - serverless-domain-manager
  - serverless-export-env
  - serverless-webpack

package:
  individually: true

custom:
  domains:
    dev: dev-ssr.aws.crowdaa.com
    preprod: preprod-ssr.aws.crowdaa.com
    prod: ssr.aws.crowdaa.com

  customDomain:
    domainName: ${self:custom.domains.${self:provider.stage}}
    stage: '${self:provider.stage}'
    createRoute53Record: true
