service: scanners

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    COLL_NAME: pictures
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
    STAGE: ${self:provider.stage}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}

functions:
  getPicture:
    handler: handlers/getPicture.default
    events:
      - http:
          path: pictures/{id}
          method: get
          cors: true
          request:
            parameters:
              paths:
                id: true
              querystrings:
                waitCreation: false

plugins:
  - serverless-webpack

package:
  individually: true
