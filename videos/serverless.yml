service: videos

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getVideoThumbLocation:
    handler: handlers/getVideoThumbLocation.default
    events:
      - http:
          path: videos/{id}/thumblocation
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-offline
  - serverless-webpack

package:
  individually: true
