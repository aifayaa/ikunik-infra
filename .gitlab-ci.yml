stages:
  - lint
  - test
  - pushDev
  - pushProd

eslint:
  image: node:12
  cache:
    paths:
      - node_modules/
  before_script:
    - git diff --dirstat=files,0 dev -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq > folderList
    - npm i
    - for i in $(<folderList); do echo "install dep in $i";cd $i; npm i; cd ..; done
  stage: lint
  script:
    - for i in $(<folderList);do if [ $i != buildspec ]; then echo "lint in $i";cd $i; ../node_modules/.bin/eslint . --ext .js --ignore-path .gitignore ; cd .. ; fi ; done

test:
  image: node:12
  cache:
    paths:
      - node_modules/
  before_script:
    - git diff --dirstat=files,0 dev -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq > folderList
    - npm i
    - cd libs; npm i; cd ..
  stage: test
  script:
    - for i in $(<folderList);do echo "lint in $i"; cd $i; if [ -d $(pwd)/test ]; then  npm i; npm run test; fi; cd ..; done



pushDevToAWS:
  variables:
    S3_BUCKET_NAME: "crowdaa-ci/ms/dev/in"

  image: python:latest
  stage: pushDev
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip

  script:
    - pip install awscli
    - git diff --dirstat=files,0 dev -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq | cut -d' ' -f2 > diffList
    - awk 'NR==FNR{a[$0]=$0;next}a[$0]' diffList deployOrderList > folderList
    - rm -f diffList
    - find . -type f -exec zip crowdaa-ms-app-source.zip {} +
    - aws s3 cp ./ s3://${S3_BUCKET_NAME}/ --recursive --exclude "*" --include "crowdaa-ms-app-source.zip"

  only:
    - dev

pushProdToAWS:
  variables:
    S3_BUCKET_NAME: "crowdaa-ci/ms/prod/in"

  image: python:latest
  stage: pushProd
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip

  script:
    - pip install awscli
    - git diff --dirstat=files,0 master -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq | cut -d' ' -f2 > diffList
    - awk 'NR==FNR{a[$0]=$0;next}a[$0]' diffList deployOrderList > folderList
    - rm -f diffList
    - find . -type f -exec zip crowdaa-ms-app-source.zip {} +
    - aws s3 cp ./ s3://${S3_BUCKET_NAME}/ --recursive --exclude "*" --include "crowdaa-ms-app-source.zip"

  only:
    - master
