  dependencies:
    - buildPreprodApiDoc
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

buildProdApiDoc:
  image: node:12
  stage: buildApiDoc
  before_script:
    - npm i
    - npm run install
  script:
    - cd swagger; npm run build:prod; cd ..
  rules:
    - if: $CI_COMMIT_TAG =~ /^release-.*/i
  artifacts:
    expire_in: 1 hrs
    paths:
      - swagger/dist/

deployProdApiDoc:
  image: python:latest
  stage: deployApiDoc
  variables:
    S3_BUCKET_NAME: "api.crowdaa.com"
  before_script:
