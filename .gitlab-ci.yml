stages:
  - lint
  - test
  - push
  - buildApiDoc
  - deployApiDoc

eslint:
  image: node:12
  stage: lint
  cache:
    paths:
      - node_modules/
  before_script:
    - git diff --dirstat=files,0 origin/dev^ -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq > folderList
    - npm i
    - npm run install
  script:
    - for i in $(<folderList);do if [ $i != buildspec ]; then echo "lint in $i";cd $i; ../node_modules/.bin/eslint . --ext .js --ignore-path .gitignore ; cd .. ; fi ; done
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE !~ /^(Wip|Draft):/i
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev"
  allow_failure: false

test:
  image: node:12
  stage: test
  cache:
    paths:
      - node_modules/
  before_script:
    - git diff --dirstat=files,0 origin/dev^ -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq > folderList
    - npm i
    - npm run install
  script:
    - for i in $(<folderList);do echo "lint in $i"; cd $i; if [ -d $(pwd)/test ]; then npm run test || exit 1; fi; cd ..; done
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "dev"

pushDevToAWS:
  image: python:latest
  stage: push
  variables:
    S3_BUCKET_NAME: "crowdaa-ci/ms/dev/in"
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - pip install awscli
    - git diff --dirstat=files,0 origin/dev^ -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq | cut -d' ' -f2 > diffList
    - awk 'NR==FNR{a[$0]=$0;next}a[$0]' diffList deployOrderList > folderList
    - rm -f diffList
    - if [ "$CI_FORCE_PUSH_TO" = "$CI_COMMIT_BRANCH" ]; then cp deployOrderList folderList; done
    - find . -type f -exec zip crowdaa-ms-app-source.zip {} +
    - aws s3 cp ./ s3://${S3_BUCKET_NAME}/ --recursive --exclude "*" --include "crowdaa-ms-app-source.zip"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

pushPreprodToAWS:
  image: python:latest
  stage: push
  variables:
    S3_BUCKET_NAME: "crowdaa-ci/ms/preprod/in"
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - pip install awscli
    - git diff --dirstat=files,0 origin/master^ -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq | cut -d' ' -f2 > diffList
    - awk 'NR==FNR{a[$0]=$0;next}a[$0]' diffList deployOrderList > folderList
    - rm -f diffList
    - if [ "$CI_FORCE_PUSH_TO" = "$CI_COMMIT_BRANCH" ]; then cp deployOrderList folderList; done
    - find . -type f -exec zip crowdaa-ms-app-source.zip {} +
    - aws s3 cp ./ s3://${S3_BUCKET_NAME}/ --recursive --exclude "*" --include "crowdaa-ms-app-source.zip"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

pushProdToAWS:
  image: python:latest
  stage: push
  variables:
    S3_BUCKET_NAME: "crowdaa-ci/ms/prod/in"
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - pip install awscli
    - git diff --dirstat=files,0 origin/master^ -- . ':(exclude)*package-lock.json' | sort | cut -d'/' -f1 | cut -d'%' -f2 | uniq | cut -d' ' -f2 > diffList
    - awk 'NR==FNR{a[$0]=$0;next}a[$0]' diffList deployOrderList > folderList
    - rm -f diffList
    - if [ "$CI_FORCE_PUSH_TO" = "$CI_COMMIT_TAG" ]; then cp deployOrderList folderList; done
    - find . -type f -exec zip crowdaa-ms-app-source.zip {} +
    - aws s3 cp ./ s3://${S3_BUCKET_NAME}/ --recursive --exclude "*" --include "crowdaa-ms-app-source.zip"
  rules:
    - if: $CI_COMMIT_TAG =~ /^release-.*/i

buildDevApiDoc:
  image: node:12
  stage: buildApiDoc
  before_script:
    - npm i
    - npm run install
  script:
    - cd swagger; npm run build; cd ..
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  artifacts:
    expire_in: 1 hrs
    paths:
      - swagger/dist/

deployDevApiDoc:
  image: python:latest
  stage: deployApiDoc
  variables:
    S3_BUCKET_NAME: "dev-api.crowdaa.com"
  before_script:
    - pip install awscli
  script:
    - aws s3 cp swagger/dist/ s3://${S3_BUCKET_NAME}/ --recursive
  dependencies:
    - buildDevApiDoc
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

buildPreprodApiDoc:
  image: node:12
  stage: buildApiDoc
  before_script:
    - npm i
    - npm run install
  script:
    - cd swagger; npm run build:prod; cd ..
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  artifacts:
    expire_in: 1 hrs
    paths:
      - swagger/dist/

deployPreprodApiDoc:
  image: python:latest
