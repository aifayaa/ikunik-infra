service: blast

provider:
  name: aws
  runtime: nodejs8.10
  stage: ${opt:stage, "dev"}
  memorySize: 2048
  timeout: 300
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment: ${file(../env.yml)}
  <<<: 
    - environment:
      MAILGUN_API_KEY: ${self:custom.MAILGUN_API_KEY.${self:provider.stage}}
      MAILGUN_DOMAIN: ${self:custom.MAILGUN_DOMAIN.${self:provider.stage}}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  blastEmail:
    handler: handlers/blastEmail.default
  blastNotification:
    handler: handlers/blastNotif.default
  blastText:
    handler: handlers/blastText.default
  removeBlastToken:
    handler: handlers/removeBlastToken.default

  getBlasts:
    handler: handlers/getBlasts.default
    events:
      - http:
          path: blasts
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpack:
    webpackConfig: ./webpack.config.js
    includeModules: true
  MAILGUN_API_KEY:
    dev: key-ee8f3c350f56cbe4002b9c00cce04769
    prod: key-ee8f3c350f56cbe4002b9c00cce04769
    awax: key-ee8f3c350f56cbe4002b9c00cce04769
  MAILGUN_DOMAIN:
    dev: sandboxe8ecbf94ba82415c9ce55b169129af2e.mailgun.org
    prod: mg.crowdaa.com
    awax: mg.crowdaa.com
