service: blast

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 2048
  timeout: 300
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment:
    MAILGUN_API_KEY: ${self:custom.MAILGUN_API_KEY.${self:provider.stage}}
    MAILGUN_DOMAIN: ${self:custom.MAILGUN_DOMAIN.${self:provider.stage}}
    FROM: postmaster
    SNS_ACCESS_KEY_ID: AKIAI3H2I7ZIK4ARL2NA
    SNS_REGION: us-west-2
    SNS_SECRET_ACCESS_KEY: 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
    LAMBDA_REGION: us-east-1
    STAGE: ${self:provider.stage}
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}

functions:
  blastEmail:
    handler: handler.handleBlastEmail
  blastNotification:
    handler: handler.handleBlastNotification
  blastText:
    handler: handler.handleBlastText
  removeBlastToken:
    handler: handler.handleRemoveBlastToken

  getBlasts:
    handler: handler.handleGetBlasts
    events:
      - http:
          path: blasts
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true


plugins:
  - serverless-webpack

package:
  individually: true

custom:
  MAILGUN_API_KEY:
    dev: key-ee8f3c350f56cbe4002b9c00cce04769
    prod: key-ee8f3c350f56cbe4002b9c00cce04769
  MAILGUN_DOMAIN:
    dev: sandboxe8ecbf94ba82415c9ce55b169129af2e.mailgun.org
    prod: mg.crowdaa.com
  webpackIncludeModules: true
