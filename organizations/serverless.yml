service: organizations

provider:
  name: aws
  runtime: nodejs16.x
  lambdaHashingVersion: '20201221'
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /admin: ${cf:admin-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  createOrg:
    handler: handlers/createOrg.default
    events:
      - http:
          path: organizations
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerAdminId}
          request:
            parameters:
              headers:
                Authorization: true

  getOrg:
    handler: handlers/getOrg.default
    events:
      - http:
          path: organizations/{id}
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerAdminId}
          request:
            parameters:
              headers:
                Authorization: true

  getOrgApps:
    handler: handlers/getOrgApps.default
    events:
      - http:
          path: organizations/{id}/apps
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerAdminId}
          request:
            parameters:
              headers:
                Authorization: true

  getOrgWebsites:
    handler: handlers/getOrgWebsites.default
    events:
      - http:
          path: organizations/{id}/websites
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerAdminId}
          request:
            parameters:
              headers:
                Authorization: true

  # For debugging purposes only
  setOrgPaid:
    handler: handlers/setOrgPaid.default
    events:
      - http:
          path: organizations/{id}/debug/payment
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerAdminId}
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - serverless-disable-request-validators
  - serverless-webpack
  - serverless-prune-plugin

custom:
  prune:
    automatic: true
    number: 3
  serverless-disable-request-validators:
    action: delete

package:
  individually: true
