service: tickets

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    MAILGUN_API_KEY: ${self:custom.MAILGUN_API_KEY.${self:provider.stage}}
    MAILGUN_DOMAIN: ${self:custom.MAILGUN_DOMAIN.${self:provider.stage}}
    FROM: postmaster
    COLL_NAME: tickets
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
    STAGE: ${self:provider.stage}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      lineup/{id}: ${cf:lineup-${self:provider.stage}.RestApiRootResourceId}
      users/{id}: ${cf:users-${self:provider.stage}.RestApiRootResourceId}

functions:
  getTickets:
    handler: handlers/getTickets.default
    events:
      - http:
          path: users/{id}/tickets
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  buyTickets:
    handler: handlers/buyTickets.handleBuyTickets
    events:
      - http:
          path: tickets
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
  
  getTicketCategoriesByLineup:
    handler: handlers/getTicketCategoriesByLineup.handleGetTicketCategoriesByLineup
    events:
      - http:
          path: lineup/{id}/ticketCategories
          method: get
          cors: true
          request:
            parameters:
              paths:
                id: true
  
  postTicketCategoriesByLineup:
    handler: handlers/postTicketCategories.default
    events:
      - http:
          path: lineup/{id}/ticketCategories
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  scanTicket:
    handler: handlers/scanTicket.handleScanTicket
    events:
      - http:
          path: tickets/{id}
          method: patch
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getTicketCategory: 
    handler: handlers/getTicketCategory.default
    events:
      - http:
          path: ticketCategories/{id}
          method: get
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  MAILGUN_API_KEY:
    dev: key-ee8f3c350f56cbe4002b9c00cce04769
    prod: key-ee8f3c350f56cbe4002b9c00cce04769
  MAILGUN_DOMAIN:
    dev: mg.crowdaa.com
    prod: mg.crowdaa.com
  webpackIncludeModules: true
