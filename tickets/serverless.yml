service: tickets

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment:
    COLL_NAME: tickets
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
    STAGE: ${self:provider.stage}
    REGION: us-east-1
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /lineup/{id}: ${cf:lineup-${self:provider.stage}.RestApiRootResourceId}

functions:
  buyTickets:
    handler: handlers/buyTickets.handleBuyTickets
    events:
      - http:
          path: tickets
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
  
  getTicketCategoriesByLineup:
    handler: handlers/getTicketCategoriesByLineup.handleGetTicketCategoriesByLineup
    events:
      - http:
          path: lineup/{id}/ticketCategories
          method: get
          cors: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpackIncludeModules: true
