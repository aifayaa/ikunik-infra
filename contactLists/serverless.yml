service: contactLists

provider:
  name: aws
  runtime: nodejs6.10
  stage: dev
  memorySize: 128
  timeout: 60
  environment:
    COLL_NAME: artistContactList
    DB_NAME: crowdaaDev
    MONGO_URL: mongodb://crowdaaDev:crowdaaDev@aws-eu-west-1-portal.10.dblayer.com:18012,aws-eu-west-1-portal.8.dblayer.com:18012/crowdaaDev?ssl=true

functions:
  getContactList:
    handler: handler.handleGetContactList
    events:
      - http:
          path: /{id}
          method: get
          authorizer: arn:aws:lambda:us-east-1:630176884077:function:account-dev-authorize
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-domain-manager
  - serverless-webpack

package:
  individually: true

custom:
  customDomain:
    domainName: 'api.aws.crowdaa.com'
    basePath: 'contactLists'
    stage: ${self:provider.stage}
    createRoute53Record: true
  webpackIncludeModules: true
