service: pressPolls

custom:
  prune:
    automatic: true
    number: 3
  serverless-disable-request-validators:
    action: delete

provider:
  name: aws
  runtime: nodejs16.x
  lambdaHashingVersion: "20201221"
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /press: ${cf:press-${self:provider.stage}.RestApiRootResourceId}
      /admin/press: ${cf:press-${self:provider.stage}.RestApiRootResourceAdminPressId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  createPoll:
    handler: handlers/createPoll.default
    events:
      - http:
          path: admin/press/polls/
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  updatePoll:
    handler: handlers/updatePoll.default
    events:
      - http:
          path: admin/press/polls/{id}
          method: patch
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  deletePoll:
    handler: handlers/deletePoll.default
    events:
      - http:
          path: admin/press/polls/{id}
          method: delete
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getPolls:
    handler: handlers/getPolls.default
    events:
      - http:
          path: admin/press/polls/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
      - http:
          path: press/polls/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}

  getPoll:
    handler: handlers/getPoll.default
    events:
      - http:
          path: admin/press/polls/{id}
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  vote:
    handler: handlers/vote.default
    events:
      - http:
          path: press/polls/{id}/vote
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - '@cruglobal/serverless-merge-config'
  - serverless-disable-request-validators
  - serverless-webpack
  - serverless-prune-plugin
  - serverless-export-env

package:
  individually: true

resources:
  Outputs:
    RestApiRootResourcePressPollsId:
      Description: Api Gateway pressPolls ID
      Value:
        Ref: ApiGatewayResourcePressPolls
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressPollsId
    RestApiRootResourceAdminPressPollsId:
      Description: Api Gateway pressPolls ID
      Value:
        Ref: ApiGatewayResourceAdminPressPolls
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourceAdminPressPollsId
