service: userGeneratedContents

custom:
  prune:
    automatic: true
    number: 3
  serverless-disable-request-validators:
    action: delete
  dev:
    us-east-1:
      REACT_APP_PRESS_SERVICE_URL: https://dev-blog.crowdaa.com
      REACT_APP_API_URL: https://dev-api.aws.crowdaa.com/v1
  preprod:
    eu-west-3:
      REACT_APP_PRESS_SERVICE_URL: https://preprod-blog.crowdaa.com
      REACT_APP_API_URL: https://preprod-api.aws.crowdaa.com/v1
  prod:
    us-east-1:
      REACT_APP_PRESS_SERVICE_URL: https://blog.crowdaa.com
      REACT_APP_API_URL: https://api.aws.crowdaa.com/v1
    eu-west-3:
      REACT_APP_PRESS_SERVICE_URL: https://blog-fr.crowdaa.com
      REACT_APP_API_URL: https://api-fr.aws.crowdaa.com/v1

provider:
  name: aws
  runtime: nodejs16.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    $<<:
      ${file(../env.yml)}
    REACT_APP_PRESS_SERVICE_URL: '${self:custom.${self:provider.stage}.${self:provider.region}.REACT_APP_PRESS_SERVICE_URL}'
    REACT_APP_API_URL: '${self:custom.${self:provider.stage}.${self:provider.region}.REACT_APP_API_URL}'
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /press/articles: ${cf:pressArticles-${self:provider.stage}.RestApiRootResourcePressId}
      /press/articles/{id}: ${cf:pressArticles-${self:provider.stage}.RestApiRootResourcePressArticlesId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  postUGC:
    handler: handlers/postUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          request:
            parameters:
              headers:
                Authorization: true
      - http:
          path: press/articles/userGeneratedContents
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          request:
            parameters:
              headers:
                Authorization: true

  getAllUGC:
    handler: handlers/getAllUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getUGC:
    handler: handlers/getUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true

  getChildrenUGC:
    handler: handlers/getChildrenUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}/children
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true
      - http:
          path: press/articles/{id}/userGeneratedContents
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              paths:
                id: true

  patchUGC:
    handler: handlers/patchUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}
          method: patch
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  removeUGC:
    handler: handlers/removeUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}
          method: delete
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  reportUGC:
    handler: handlers/reportUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}/report
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              headers:
                Authorization: true

  reportUGCUser:
    handler: handlers/reportUserGeneratedContentUser.default
    events:
      - http:
          path: userGeneratedContents/{id}/reportUser
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              headers:
                Authorization: true

  getReports:
    handler: handlers/getUserGeneratedContentReports.default
    events:
      - http:
          path: userGeneratedContents/{id}/reports
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  reviewUGC:
    handler: handlers/reviewUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}/review
          method: patch
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  notifyUGC:
    handler: handlers/notifyUserGeneratedContents.default
    events:
      - http:
          path: userGeneratedContents/{id}/notify
          method: patch
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

plugins:
  - '@cruglobal/serverless-merge-config'
  - serverless-disable-request-validators
  - serverless-webpack
  - serverless-prune-plugin
  - serverless-export-env

package:
  individually: true
