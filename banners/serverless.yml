service: banners

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getBanners:
    handler: handler.handleGetBanners
    events:
      - http:
          path: banners/
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          cors: true

plugins:
  - serverless-offline
  - serverless-webpack

package:
  individually: true
