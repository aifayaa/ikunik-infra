service: pressArticles

provider:
  name: aws
  runtime: nodejs6.10
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    COLL_NAME: pressArticles
    DB_NAME: crowdaaDev
    MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
    STAGE: ${self:provider.stage}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /press: ${cf:press-${self:provider.stage}.RestApiRootResourceId}

functions:
  getArticles:
    handler: handlers/getArticles.default
    events:
      - http:
          path: press/articles/
          method: get
          cors: true
  getArticle:
    handler: handlers/getArticle.default
    events:
      - http:
          path: press/articles/{id}
          method: get
          cors: true
          request:
            parameters:
              paths:
                id: true
plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpackIncludeModules: true
