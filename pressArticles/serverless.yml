service: pressArticles

custom:
  prune:
    automatic: true
    number: 3
  serverless-disable-request-validators:
    action: delete
  dev:
    us-east-1:
      REACT_APP_SSR_URL: dev-ssr.aws.crowdaa.com
      NOTIFICATION_STATE_MACHINE_NAME: DevSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-DevUsSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-dev-sendArticleNotifications
  preprod:
    eu-west-3:
      REACT_APP_SSR_URL: preprod-ssr.aws.crowdaa.com
      NOTIFICATION_STATE_MACHINE_NAME: PreprodSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-PreprodFrSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-preprod-sendArticleNotifications
  prod:
    us-east-1:
      REACT_APP_SSR_URL: ssr.aws.crowdaa.com
      NOTIFICATION_STATE_MACHINE_NAME: ProdSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-ProdUsSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-prod-sendArticleNotifications
    eu-west-3:
      REACT_APP_SSR_URL: ssr-fr.aws.crowdaa.com
      NOTIFICATION_STATE_MACHINE_NAME: ProdSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-ProdFrSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-prod-sendArticleNotifications
  modularize:
    glob: '../env.module.yml' # glob pattern

provider:
  name: aws
  runtime: nodejs16.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  # environment: ${file(./.env.${self:provider.stage}.${self:provider.region}.yml)}
  environment:
    # $<<: ${file(../env.yml)}
    # ADMIN_APP: ${cf:api-v1-${self:provider.stage}.AdminApp}
    # APP_NAME_DEFAULT: crowdaa
    # APP_API_KEY_DEFAULT: nQ9ZO9DEgfaOzWY44Xu2J2uaPtP92t176PpBkdqu
    # AUTH_PASS: fL9lAwCNRO8O
    # AUTH_SMTP: ssl0.ovh.net
    # AUTH_USER: services@crowdaa.com
    # CROWDAA_FEES: 0.2
    # DB_NAME: crowdaaDev
    # DEFAULT_LIMIT: 15
    # DYNAMO_AWS_KEY: AKIAJGROD5HF6C67HFHA
    # DYNAMO_AWS_SECRET: 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
    # IOS_FEES: 0.3
    # MAILGUN_API_KEY: ${cf:api-v1-${self:provider.stage}.MailgunApiKey}
    # MAILGUN_DOMAIN: ${cf:api-v1-${self:provider.stage}.MailgunDomain}
    # MAILGUN_FROM: postmaster
    # MINIMUM_PAYOUT: 600
    # MONGO_URL: ${cf:api-v1-${self:provider.stage}.MongoURL}
    # REGION: ${self:provider.region}
    # S3_ACCESS_KEY_ID: AKIAI3H2I7ZIK4ARL2NA
    # S3_BUCKET: crowdaa-user-content
    # S3_REGION: us-east-1
    # S3_SECRET_ACCESS_KEY: 0w8fSrKMg+IBRA1YeUoNy4Ytakr7HmBKOoeYThkD
    # SMTP_FROM: noreply@crowdaa.com
    # SMTP_LOGIN: noreply@crowdaa.com
    # SMTP_SERVER: ssl0.ovh.net:465
    # SMTP_SECURE: true
    # SMTP_PASSWORD: '!VnL6`h"7K'
    # SNS_KEY_ID: AKIAI3H2I7ZIK4ARL2NA
    # SNS_PLATFORM_ANDROID_ARN: arn:aws:sns:us-west-2:630176884077:app/GCM/Crowdaa-android
    # SNS_PLATFORM_IOS_ARN: arn:aws:sns:us-west-2:630176884077:app/APNS/Crowdaa-iosprod
    # SNS_REGION: us-west-2
    # SNS_SECRET: 0w8fSrKMg+IBRA1YeUoNy4Ytakr7HmBKOoeYThkD
    # SNS_TOPIC: arn:aws:sns:us-west-2:630176884077:crowdaa-test
    # STAGE: ${self:provider.stage}

    REACT_APP_SSR_URL: '${self:custom.${self:provider.stage}.${self:provider.region}.REACT_APP_SSR_URL}'
    NOTIFICATION_STATE_MACHINE_NAME: '${self:custom.${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_NAME}'
    NOTIFICATION_STATE_MACHINE_ROLE: '${self:custom.${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_ROLE}'
    NOTIFICATION_STATE_MACHINE_RESOURCE: '${self:custom.${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_RESOURCE}'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: '*'
        - Effect: Allow
          Action:
            - states:CreateStateMachine
            - states:StartExecution
          Resource: 'arn:aws:states:${self:provider.region}:630176884077:stateMachine:${file(../blast/env.notificationStateMachine.yml):${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_NAME}'
        - Effect: Allow
          Action:
            - iam:PassRole
          Resource: '${file(../blast/env.notificationStateMachine.yml):${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_ROLE}'
        - Effect: Allow
          Action:
            - states:StopExecution
          Resource: 'arn:aws:states:${self:provider.region}:630176884077:execution:${file(../blast/env.notificationStateMachine.yml):${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_ROLE}:${self:provider.stage}*'
        - Effect: Allow
          Action:
            - states:StopExecution
          Resource: 'arn:aws:states:${self:provider.region}:630176884077:execution:${self:provider.environment.NOTIFICATION_STATE_MACHINE_NAME}:${self:provider.stage}*'
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /press: ${cf:press-${self:provider.stage}.RestApiRootResourceId}
      /admin/press: ${cf:press-${self:provider.stage}.RestApiRootResourceAdminPressId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  sendArticleNotifications:
    handler: handlers/sendArticleNotifications.default

  getArticles:
    handler: handlers/getArticles.default
    events:
      - http:
          path: press/articles/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
      - http:
          path: press/articles/v2/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getAllArticles:
    handler: handlers/getAllArticles.default
    events:
      - http:
          path: admin/press/articlesAll/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getArticlesFrom:
    handler: handlers/getArticlesFrom.default
    events:
      - http:
          path: admin/press/articlesFrom
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getPurchasedArticles:
    handler: handlers/getPurchasedArticles.default
    events:
      - http:
          path: press/purchasedArticles/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              headers:
                Authorization: true

  getArticle:
    handler: handlers/getArticle.default
    events:
      - http:
          path: press/articles/{id}
          method: get
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getArticleShareUrl:
    handler: handlers/getArticleShareUrl.default
    events:
      - http:
          path: press/articles/{id}/shareUrl
          method: get
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getArticleDraft:
    handler: handlers/getArticleDraft.default
    events:
      - http:
          path: press/articles/{id}/draft
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  postArticle:
    handler: handlers/postArticle.default
    events:
      - http:
          path: press/articles
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              querystrings:
                autoPublish: false
                forceCategoryId: false
                forcePictures: false
                xmlTagMapper: false

  putArticle:
    handler: handlers/putArticle.default
    events:
      - http:
          path: press/articles
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  publishArticle:
    handler: handlers/publishArticle.default
    events:
      - http:
          path: press/articles/{id}/publish
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  renderArticle:
    handler: handlers/renderArticle.default
    events:
      - http:
          path: admin/press/renderArticle
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  generateContent:
    handler: handlers/generateContent.default
    events:
      - http:
          path: admin/press/articles/generate
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  # TODO: check if this end-point is called somewhere -> delete?
  getArticlesStats:
    handler: handlers/getArticlesStats.default
    events:
      - http:
          path: admin/press/articles/stats
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  generatedContentStatus:
    handler: handlers/generatedContentStatus.default
    events:
      - http:
          path: admin/press/articles/generated/{id}
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  unpublishArticle:
    handler: handlers/unpublishArticle.default
    events:
      - http:
          path: press/articles/{id}/unpublish
          method: put
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  purchaseArticle:
    handler: handlers/purchaseArticle.default
    events:
      - http:
          path: press/articles/{id}/purchase
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              headers:
                Authorization: true

  addLikeArticle:
    handler: handlers/addLikeArticle.default
    events:
      - http:
          path: press/articles/{id}/like
          method: put
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  addViewArticle:
    handler: handlers/addViewArticle.default
    events:
      - http:
          path: press/articles/{id}/view
          method: put
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getArticleModals:
    handler: handlers/getArticleModals.default
    events:
      - http:
          path: press/articles/{id}/modals
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          request:
            parameters:
              headers:
                Authorization: true

  removeArticle:
    handler: handlers/removeArticle.default
    events:
      - http:
          path: press/articles/{id}
          method: delete
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - serverless-plugin-modularize
  # - '@cruglobal/serverless-merge-config'
  - serverless-offline
  - serverless-disable-request-validators
  - serverless-webpack
  - serverless-prune-plugin
  - serverless-export-env

package:
  individually: true

resources:
  Outputs:
    RestApiRootResourcePressId:
      Description: Api Gateway pressArticles ID
      Value:
        Ref: ApiGatewayResourcePressArticles
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressId
    RestApiRootResourcePressArticlesId:
      Description: Api Gateway pressArticlesIdVar ID
      Value:
        Ref: ApiGatewayResourcePressArticlesIdVar
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressArticlesId
