service: pressArticles

custom:
  dev:
    NOTIFICATION_STATE_MACHINE_NAME: DevDelayedArticleNotification
    NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-DevDelayedArticleNotification-role-191bc6ee
    NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:us-east-1:630176884077:function:pressArticles-dev-broadcastArticleNotification
  prod:
    NOTIFICATION_STATE_MACHINE_NAME: ProdDelayedArticleNotification
    NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-ProdDelayedArticleNotification-role-40903dbe
    NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:us-east-1:630176884077:function:pressArticles-prod-broadcastArticleNotification

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    $<<:
      ${file(../env.yml)}
    NOTIFICATION_STATE_MACHINE_NAME: '${self:custom.dev.NOTIFICATION_STATE_MACHINE_NAME}'
    NOTIFICATION_STATE_MACHINE_ROLE: '${self:custom.dev.NOTIFICATION_STATE_MACHINE_ROLE}'
    NOTIFICATION_STATE_MACHINE_RESOURCE: '${self:custom.dev.NOTIFICATION_STATE_MACHINE_RESOURCE}'
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
    - Effect: Allow
      Action:
        - states:CreateStateMachine
        - states:StartExecution
      Resource: "arn:aws:states:us-east-1:630176884077:stateMachine:${self:provider.environment.NOTIFICATION_STATE_MACHINE_NAME}"
    - Effect: Allow
      Action:
        - iam:PassRole
      Resource: "${self:provider.environment.NOTIFICATION_STATE_MACHINE_ROLE}"
    - Effect: Allow
      Action:
        - states:StopExecution
      Resource: "arn:aws:states:us-east-1:630176884077:execution:${self:provider.environment.NOTIFICATION_STATE_MACHINE_NAME}:${self:provider.stage}-*"
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /press: ${cf:press-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  broadcastArticleNotification:
      handler: handlers/broadcastArticleNotification.default

  getArticles:
    handler: handlers/getArticles.default
    events:
      - http:
          path: press/articles/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getAllArticles:
    handler: handlers/getAllArticles.default
    events:
      - http:
          path: press/articlesAll/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getPurchasedArticles:
    handler: handlers/getPurchasedArticles.default
    events:
      - http:
          path: press/purchasedArticles/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getArticle:
    handler: handlers/getArticle.default
    events:
      - http:
          path: press/articles/{id}
          method: get
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getArticleDraft:
    handler: handlers/getArticleDraft.default
    events:
      - http:
          path: press/articles/{id}/draft
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  postArticle:
    handler: handlers/postArticle.default
    events:
      - http:
          path: press/articles
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              querystrings:
                  autoPublish: false
                  forceCategoryId: false
                  forcePictures: false
                  xmlTagMapper: false

  putArticle:
      handler: handlers/putArticle.default
      events:
        - http:
            path: press/articles
            method: put
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  publishArticle:
      handler: handlers/publishArticle.default
      events:
        - http:
            path: press/articles/{id}/publish
            method: put
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  unpublishArticle:
      handler: handlers/unpublishArticle.default
      events:
        - http:
            path: press/articles/{id}/unpublish
            method: put
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  purchaseArticle:
      handler: handlers/purchaseArticle.default
      events:
        - http:
            path: press/articles/{id}/purchase
            method: post
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          request:
            parameters:
              headers:
                Authorization: true

  removeArticle:
      handler: handlers/removeArticle.default
      events:
        - http:
            path: press/articles/{id}
            method: delete
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - '@cruglobal/serverless-merge-config'
  - serverless-offline
  - serverless-webpack
  - serverless-export-env

package:
  individually: true

resources:
  Outputs:
    RestApiRootResourcePressId:
      Description: Api Gateway pressArticles ID
      Value:
        Ref: ApiGatewayResourcePressArticles
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressId
    RestApiRootResourcePressArticlesId:
      Description: Api Gateway pressArticlesIdVar ID
      Value:
        Ref: ApiGatewayResourcePressArticlesIdVar
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressArticlesId
