service: pressArticles

custom:
  dev:
    us-east-1:
      NOTIFICATION_STATE_MACHINE_NAME: DevSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-DevUsSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-dev-sendArticleNotifications
  preprod:
    eu-west-3:
      NOTIFICATION_STATE_MACHINE_NAME: PreprodSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-PreprodFrSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-preprod-sendArticleNotifications
  prod:
    us-east-1:
      NOTIFICATION_STATE_MACHINE_NAME: ProdSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-ProdUsSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-prod-sendArticleNotifications
    eu-west-3:
      NOTIFICATION_STATE_MACHINE_NAME: ProdSendArticleNotifications
      NOTIFICATION_STATE_MACHINE_ROLE: arn:aws:iam::630176884077:role/service-role/StepFunctions-ProdFrSendArticleNotifications-role
      NOTIFICATION_STATE_MACHINE_RESOURCE: arn:aws:lambda:${self:provider.region}:630176884077:function:pressArticles-prod-sendArticleNotifications

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment:
    $<<:
      ${file(../env.yml)}
    NOTIFICATION_STATE_MACHINE_NAME: '${self:custom.${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_NAME}'
    NOTIFICATION_STATE_MACHINE_ROLE: '${self:custom.${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_ROLE}'
    NOTIFICATION_STATE_MACHINE_RESOURCE: '${self:custom.${self:provider.stage}.${self:provider.region}.NOTIFICATION_STATE_MACHINE_RESOURCE}'
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
    - Effect: Allow
      Action:
        - states:CreateStateMachine
        - states:StartExecution
      Resource: "arn:aws:states:${self:provider.region}:630176884077:stateMachine:${self:provider.environment.NOTIFICATION_STATE_MACHINE_NAME}"
    - Effect: Allow
      Action:
        - iam:PassRole
      Resource: "${self:provider.environment.NOTIFICATION_STATE_MACHINE_ROLE}"
    - Effect: Allow
      Action:
        - states:StopExecution
      Resource: "arn:aws:states:${self:provider.region}:630176884077:execution:${self:provider.environment.NOTIFICATION_STATE_MACHINE_NAME}:${self:provider.stage}*"
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      /press: ${cf:press-${self:provider.stage}.RestApiRootResourceId}
      /admin/press: ${cf:press-${self:provider.stage}.RestApiRootResourceAdminPressId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  sendArticleNotifications:
    handler: handlers/sendArticleNotifications.default

  getArticles:
    handler: handlers/getArticles.default
    events:
      - http:
          path: press/articles/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
      - http:
          path: press/articles/v2/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getAllArticles:
    handler: handlers/getAllArticles.default
    events:
      - http:
          path: admin/press/articlesAll/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getArticlesFrom:
    handler: handlers/getArticlesFrom.default
    events:
      - http:
          path: admin/press/articlesFrom
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getPurchasedArticles:
    handler: handlers/getPurchasedArticles.default
    events:
      - http:
          path: press/purchasedArticles/
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  getArticle:
    handler: handlers/getArticle.default
    events:
      - http:
          path: press/articles/{id}
          method: get
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  getArticleDraft:
    handler: handlers/getArticleDraft.default
    events:
      - http:
          path: press/articles/{id}/draft
          method: get
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true

  postArticle:
    handler: handlers/postArticle.default
    events:
      - http:
          path: press/articles
          method: post
          cors: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true
              querystrings:
                  autoPublish: false
                  forceCategoryId: false
                  forcePictures: false
                  xmlTagMapper: false

  putArticle:
      handler: handlers/putArticle.default
      events:
        - http:
            path: press/articles
            method: put
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  publishArticle:
      handler: handlers/publishArticle.default
      events:
        - http:
            path: press/articles/{id}/publish
            method: put
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  unpublishArticle:
      handler: handlers/unpublishArticle.default
      events:
        - http:
            path: press/articles/{id}/unpublish
            method: put
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

  purchaseArticle:
      handler: handlers/purchaseArticle.default
      events:
        - http:
            path: press/articles/{id}/purchase
            method: post
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          request:
            parameters:
              headers:
                Authorization: true

  addLikeArticle:
    handler: handlers/addLikeArticle.default
    events:
      - http:
          path: press/articles/{id}/like
          method: put
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  addViewArticle:
    handler: handlers/addViewArticle.default
    events:
      - http:
          path: press/articles/{id}/view
          method: put
          cors: true
          request:
            parameters:
              headers:
                Authorization: true
              paths:
                id: true
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}

  removeArticle:
      handler: handlers/removeArticle.default
      events:
        - http:
            path: press/articles/{id}
            method: delete
            cors: true
            authorizer:
              type: CUSTOM
              authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - '@cruglobal/serverless-merge-config'
  - serverless-offline
  - serverless-webpack
  - serverless-export-env

package:
  individually: true

resources:
  Outputs:
    RestApiRootResourcePressId:
      Description: Api Gateway pressArticles ID
      Value:
        Ref: ApiGatewayResourcePressArticles
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressId
    RestApiRootResourcePressArticlesId:
      Description: Api Gateway pressArticlesIdVar ID
      Value:
        Ref: ApiGatewayResourcePressArticlesIdVar
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourcePressArticlesId
