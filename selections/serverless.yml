service: selections

provider:
  name: aws
  runtime: nodejs16.x
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      users/{id}: ${cf:users-${self:provider.stage}.RestApiRootResourceId}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getSelection:
    handler: handlers/getSelection.default
    events:
      - http:
          path: selections/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          cors:
            origin: "*"
            headers:
              - Cache-Control
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false
          request:
            parameters:
              paths:
                id: true

  getSelectionSubscriptions:
    handler: handlers/getSelectionSubscriptions.default
    events:
      - http:
          path: selections/{id}/subscriptions
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

  getSelections:
    handler: handlers/getSelections.default
    events:
      - http:
          path: selections
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          cors:
            origin: "*"
            headers:
              - Cache-Control
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false
          request:
            parameters:
              querystrings:
                mobile: false
                root: false
                type: false
                web: false

  getUserSelections:
    handler: handlers/getUserSelections.default
    events:
      - http:
          path: users/{id}/selections
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors:
            origin: "*"
            headers:
              - Cache-Control
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

  postUserSelection:
    handler: handlers/postUserSelection.default
    events:
      - http:
          path: users/{id}/selections
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

  deleteUserSelection:
    handler: handlers/deleteUserSelection.default
    events:
      - http:
          path: users/{id}/selections/{selectionId}
          method: delete
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
                selectionId: true
              headers:
                Authorization: true

  patchUserSelection:
    handler: handlers/patchUserSelection.default
    events:
      - http:
          path: users/{id}/selections/{selectionId}
          method: patch
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
                selectionId: true
              headers:
                Authorization: true

  linkMediaToSelection:
    handler: handlers/linkMediaToSelection.default
    events:
      - http:
          path: /selections/{id}/media
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

  unlinkMediaFromSelection:
    handler: handlers/unlinkMediaFromSelection.default
    events:
      - http:
          path: /selections/{id}/media
          method: delete
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
              headers:
                Authorization: true

plugins:
  - serverless-disable-request-validators
  - serverless-webpack
  - serverless-prune-plugin

custom:
  prune:
    automatic: true
    number: 3
  serverless-disable-request-validators:
    action: delete

package:
  individually: true

resources:
  Resources:
    ApiGatewayMethodSelectionsGet:
      Properties:
        RequestParameters:
          method.request.header.x-api-key: true
          method.request.querystring.mobile: true
          method.request.querystring.root: true
          method.request.querystring.type: true
          method.request.querystring.web: true
        Integration:
          RequestParameters:
            integration.request.header.x-api-key: method.request.header.x-api-key
            integration.request.querystring.mobile: method.request.querystring.mobile
            integration.request.querystring.root: method.request.querystring.root
            integration.request.querystring.type: method.request.querystring.type
            integration.request.querystring.web: method.request.querystring.web
          CacheNamespace: ApiGatewayMethodSelectionsGetCacheNS
          CacheKeyParameters:
            - method.request.header.x-api-key
            - method.request.querystring.mobile
            - method.request.querystring.root
            - method.request.querystring.type
            - method.request.querystring.web

    ApiGatewayMethodSelectionsIdVarGet:
      Properties:
        RequestParameters:
          method.request.path.id: true
        Integration:
          RequestParameters:
            integration.request.path.id: method.request.path.id
          CacheNamespace: ApiGatewayMethodSelectionsIdVarGetCacheNS
          CacheKeyParameters:
            - method.request.path.id
