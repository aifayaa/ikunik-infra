service: authorize

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getAuthorize:
    handler: handler.handleGetAuthorize
    events:
      - http:
          path: authorize
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerNoAppId}
          cors: true
          request:
            parameters:
              headers:
                Authorization: true

plugins:
  - serverless-webpack

package:
  individually: true

custom:
  webpack:
    includeModules: true
