service: artists

provider:
  name: aws
  runtime: nodejs16.x
  stage: ${opt:stage, "dev"}
  memorySize: 128
  timeout: 30
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
    restApiResources:
      users/{id}: ${cf:users-${self:provider.stage}.RestApiRootResourceId}
  region: ${opt:region, "us-east-1"}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  getArtist:
    handler: handlers/getArtist.default
    events:
      - http:
          path: artists/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerPublicId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  getArtistPicture:
    handler: handlers/getArtistPicture.default
    events:
      - http:
          path: artists/{id}/picture
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerId}
          cors: true
          request:
            parameters:
              paths:
                id: true
  
  getUserArtists:
    handler: handlers/getUserArtists.default
    events:
      - http:
          path: users/{id}/artists
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  createArtist:
    handler: handlers/createArtist.default
    events:
      - http:
          path: users/{id}/artists
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerArtistId}
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-offline
  - serverless-webpack
  - serverless-prune-plugin

custom:
  prune:
    automatic: true
    number: 3

package:
  individually: true

resources:
  Resources:
    ApiGatewayMethodArtistsIdVarGet:
      Properties:
        RequestParameters:
          method.request.path.id: true
        Integration:
          RequestParameters:
            integration.request.path.id: method.request.path.id
          CacheNamespace: ApiGatewayMethodArtistsIdVarGetCacheNS
          CacheKeyParameters:
            - method.request.path.id

  Outputs:
    RestApiRootResourceId:
      Description: Api Gateway artists ID
      Value:
        Ref: ApiGatewayResourceArtistsIdVar
      Export:
        Name: ${self:service}:${self:provider.stage}:RestApiRootResourceId
