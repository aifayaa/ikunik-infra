service: userPermissions

provider:
  name: aws
  runtime: nodejs12.x
  stage: ${opt:stage, "dev"}
  region: ${opt:region, file(../api-v1/serverless.yml):custom.region.${self:provider.stage}, "us-east-1"}
  memorySize: 128
  timeout: 30
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"
  environment: ${file(../env.yml)}
  apiGateway:
    restApiId: ${cf:api-v1-${self:provider.stage}.RestApiId}
    restApiRootResourceId: ${cf:api-v1-${self:provider.stage}.RestApiRootResourceId}
  deploymentBucket: ms-deployment-${self:provider.region}

functions:
  addUserPermission:
    handler: handlers/addUserPermission.default
    events:
      - http:
          path: userPermissions
          method: post
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true

  getUserPermission:
    handler: handlers/getUserPermission.default
    events:
      - http:
          path: userPermissions/{id}
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  listUserPermissions:
    handler: handlers/listUserPermissions.default
    events:
      - http:
          path: userPermissions
          method: get
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true

  editUserPermission:
    handler: handlers/editUserPermission.default
    events:
      - http:
          path: userPermissions/{id}
          method: put
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  deleteUserPermission:
    handler: handlers/deleteUserPermission.default
    events:
      - http:
          path: userPermissions/{id}
          method: delete
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true
          request:
            parameters:
              paths:
                id: true

  toggleUserPermissionToUser:
    handler: handlers/toggleUserPermissionToUser.default
    events:
      - http:
          path: userPermissions/{id}/user
          method: put
          authorizer:
            type: CUSTOM
            authorizerId: ${cf:account-${self:provider.stage}.ApiGatewayAuthorizerWithPermsId}
          cors: true
          request:
            parameters:
              paths:
                id: true

plugins:
  - serverless-offline
  - serverless-webpack
  - serverless-export-env

package:
  individually: true
